<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cupons de Desconto</title>
    <link href="/css/bootstrap.css" rel="stylesheet" type="text/css">
</head>
<body class="bg-light"> 
    <div class="container py-5">
        <div id="areaLista">
            <div class="d-flex justify-content-between align-items-center">
                <h2 class="h2  text-dark">Cupons de Desconto</h2>
                <button onclick="novoCupom()"class="btn btn-primary px-4">+ Criar Cupom</button>
            </div>

            <div class="card border-0 shadow-sm p-4">
                
                <div class="row">
                    <div class="col-md-9">
                        <label for="inputCodigoBusca" class="form-label">Código</label>
                        <input type="text" class="form-control" id="inputCodigoBusca"  placeholder="Código do Cupom">
                    </div>
                    <div class="col-md-3">
                        <button class="btn btn-outline-secondary w-100">🔍 Busca</button>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-3">
                        <label for="inputDataInicioBusca" class="form-label">Data de Início</label>
                        <input type="date" class="form-control" id="inputDataInicioBusca" placeholder="Data de Início">
                    </div>
                    <div class="col-md-3">
                        <label for="inputDataInicioBusca" class="form-label">Data de Fim</label>
                        <input type="date" class="form-control" id="inputDataFimBusca" placeholder="Data de Fim">
                    </div>
                </div>


                <div class="table-responsive">
                    <table class="table table-hover align-middle text-center mb-0">
                        <thead class="text-muted">
                            <tr>
                                <th class="fw-normal pb-3 border-bottom">Origem</th>
                                <th class="fw-normal pb-3 border-bottom">Código</th>
                                <th class="fw-normal pb-3 border-bottom">Tipo de Desconto</th>
                                <th class="fw-normal pb-3 border-bottom">Período</th>
                                <th class="fw-normal pb-3 border-bottom">Utilizados</th>
                                <th class="fw-normal pb-3 border-bottom">Ações</th>
                            </tr>
                        </thead>
                        <tbody class="border-top-0" id="tabelaCupons">
                            <!-- 
                            <tr>
                                <td class="py-3">Plataforma</td>
                                <td>LAB3</td>
                                <td>Percentagem (%)</td>
                                <td>01/01/2026<br>30/06/2026</td>
                                <td>15</td>
                                <td>
                                    <button class="btn btn-sm btn-link text-decoration-none fs-5">👁️</button>
                                    <button class="btn btn-sm btn-link text-decoration-none fs-5 text-danger">❌</button>
                                </td>
                            </tr>
                            <tr>
                                <td class="py-3">Loja</td>
                                <td>SENAC</td>
                                <td>Frete Grátis</td>
                                <td>01/01/2025<br>30/12/2025</td>
                                <td>42</td>
                                <td>
                                    <button class="btn btn-sm btn-link text-decoration-none fs-5">👁️</button>
                                    <button class="btn btn-sm btn-link text-decoration-none fs-5 text-danger">❌</button>
                                </td>
                            </tr> -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div> <!-- Fim da área Lista -->




        <div id="areaEdicao" hidden>   <!-- Incluir o Hidden -->
            <input type="hidden" id="idDesconto" />
            <div>
                <h2 class="h2" id="lblNovoCupom">Novo Cupom</h2>
                <h2 class="h2" id="lblVisualizarCupom" hidden>Visualizar Cupom</h2>

                <hr>
            </div>
            <div>
                <h5 class="h5 mb-0 text-dark">Origem</h5>
            </div>
            <div class="form-check form-check-inline col-md-2">
                <input class="form-check-input" type="radio" name="inlineRadioOrigem" id="inlineRadioPlataforma" value="P">
                <label class="form-check-label" for="inlineRadioPlataforma">Plataforma</label>
            </div>
            <div class="form-check form-check-inline col-md-2">
                <input class="form-check-input" type="radio" name="inlineRadioOrigem" id="inlineRadioLoja" value="L">
                <label class="form-check-label" for="inlineRadioLoja">Loja</label>
            </div>

            <div class="col-md-9">
                <label for="inputCodigo" class="form-label">Código</label>
                <input type="text" class="form-control" id="inputCodigo"  placeholder="Código do Cupom">
            </div>
            <div>
                <h5 class="h5 mb-0 text-dark">Tipo de Desconto</h5>
            </div>
            <div class="row">

                <div class="form-check form-check-inline col-md-2">
                    <input class="form-check-input" onclick="exibeTipoDesconto('P')" type="radio" name="inlineRadioTipo" id="inlineRadioPercentual" value="P">
                    <label class="form-check-label" for="inlineRadioPercentual">Percentual %</label>
                </div>
                <div class="form-check form-check-inline col-md-2">
                    <input class="form-check-input" onclick="exibeTipoDesconto('V')" type="radio" name="inlineRadioTipo" id="inlineRadioValor" value="V">
                    <label class="form-check-label" for="inlineRadioValor">Valor</label>
                </div>
                <div class="form-check form-check-inline col-md-2">
                    <input class="form-check-input" onclick="exibeTipoDesconto('F')" type="radio" name="inlineRadioTipo" id="inlineRadioFrete" value="F">
                    <label class="form-check-label" for="inlineRadioFrete">Frete grátis</label>
                </div>

                <div class="col-md-3">
                    <label for="inputPercentual" class="form-label" id="labelPercentual">Percentual do Desconto</label>
                    <input type="text" class="form-control" id="inputPercentual">
                </div>

                <div class="col-md-3">
                    <label for="inputValor" class="form-label" id="labelValor">Valor do Desconto</label>
                    <input type="text" class="form-control" id="inputValor">
                </div>
            </div>
            <div>
                <h5 class="h5 mb-0 text-dark">Período</h5>
            </div>

            <div class="row">
                <div class="col-md-3">
                    <label for="inputDataInicio" class="form-label">Data de Início</label>
                    <input type="datetime-local" class="form-control" id="inputDataInicio">
                </div>
                <div class="col-md-3">
                    <label for="inputDataFim" class="form-label">Data de Fim</label>
                    <input type="datetime-local" class="form-control" id="inputDataFim">
                </div>
            </div>
            <div class="col-md-9">
                <label for="inputObservacao" class="form-label">Observação</label>
                <textarea class="form-control" id="inputObservacao" rows="3"></textarea>
            </div>
            <div class="row">
                <div class="col-md-6">
                    <label for="inputCriadoPor" class="form-label">Criado Por</label>
                    <input type="text" class="form-control" id="inputCriadoPor" disabled>
                </div>
                <div class="col-md-3">
                    <label for="inputDataCriacao" class="form-label">Data de Criação</label>
                    <input type="datetime-local" class="form-control" id="inputDataCriacao" disabled>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6">
                    <label for="inputInativadoPor" class="form-label">Inativado Por</label>
                    <input type="text" class="form-control" id="inputInativadoPor" disabled>
                </div>
                <div class="col-md-3">
                    <label for="inputDataInativacao" class="form-label">Data de Inativação</label>
                    <input type="datetime-local" class="form-control" id="inputDataInativacao" disabled>
                </div>
            </div>
            <hr>
            <div class="row">
                <div class="form-check col-md-3"">
                    <input class="form-check-input" type="checkbox" value="0" id="ckBoxInativo" disabled>
                    <label class="form-check-label" for="ckBoxInativo">Inativo</label>
                </div>
                <button id="btnCancelarCupom" onclick="ocultarFormulario()" class="btn btn-secondary col-md-3">Cancelar</button>
                <button id="btnSalvarCupom" onclick="salvarCupom()" class="btn btn-primary col-md-3">Salvar</button>
                <button id="btnRetornarCupom"  onclick="ocultarFormulario()" class="btn btn-primary col-md-3" hidden>Retornar</button>
                

            </div>
        </div> <!-- Fim da Área de Edição -->

    </div>


   

    <!-- Carrega o Boostrap -->

    <script src="js/bootstrap.js" type="text/javascript"></script>
    <script src="js/cupom.js" type="text/javascript"></script>


</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vouchers de Desconto</title>
    
    <link href="css/style.css" rel="stylesheet" type="text/css">
</head>
<body class="bg-light">

    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="h4 mb-0 text-dark">Vouchers de Desconto</h2>
            <button class="btn btn-primary px-4">+ Criar Voucher</button>
        </div>

        <div class="card border-0 shadow-sm p-4">
            
            <div class="row mb-3">
                <div class="col-md-9 mb-2 mb-md-0">
                    <input type="text" class="form-control" placeholder="Código do Voucher">
                </div>
                <div class="col-md-3">
                    <button class="btn btn-outline-secondary w-100">🔍 Busca</button>
                </div>
            </div>

            <div class="row mb-4">
                <div class="col-md-6">
                    <select class="form-select text-muted">
                        <option selected disabled>Cliente</option>
                        <option value="1">Jhon Custer</option>
                        <option value="2">Felix Rubson</option>
                    </select>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle text-center mb-0">
                    <thead class="text-muted">
                        <tr>
                            <th class="fw-normal pb-3 border-bottom">Origem</th>
                            <th class="fw-normal pb-3 border-bottom">Cliente</th>
                            <th class="fw-normal pb-3 border-bottom">Código</th>
                            <th class="fw-normal pb-3 border-bottom">Tipo de Desconto</th>
                            <th class="fw-normal pb-3 border-bottom">Período</th>
                            <th class="fw-normal pb-3 border-bottom">Utilizado</th>
                            <th class="fw-normal pb-3 border-bottom">Ações</th>
                        </tr>
                    </thead>
                    <tbody class="border-top-0">
                        <tr>
                            <td class="py-3">Plataforma</td>
                            <td>Jhon Custer</td>
                            <td>2025-0000-<br>931282-000002</td>
                            <td>Percentagem (%)</td>
                            <td>01/01/2026<br>30/06/2026</td>
                            <td>Não</td>
                            <td>
                                <button class="btn btn-sm btn-link text-decoration-none fs-5">👁️</button>
                                <button class="btn btn-sm btn-link text-decoration-none fs-5 text-danger">❌</button>
                            </td>
                        </tr>
                        <tr>
                            <td class="py-3">Loja</td>
                            <td>Felix Rubson</td>
                            <td>2025-0000-<br>982682-000001</td>
                            <td>Valor</td>
                            <td>01/01/2025<br>30/12/2025</td>
                            <td>Sim</td>
                            <td>
                                <button class="btn btn-sm btn-link text-decoration-none fs-5">👁️</button>
                                <button class="btn btn-sm btn-link text-decoration-none fs-5 text-danger">❌</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>

    <script src="js/script.js" type="text/javascript"></script>
</body>
</html>
